<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StudBud - Time Tools</title>
  <link rel="icon" href="images/favicon.svg">
  <link href="scss/main.scss" rel="stylesheet" type="text/css">
  <script src="https://kit.fontawesome.com/9263dbef1b.js" crossorigin="anonymous"></script>
</head>

<body class="app-container">
  <!-- nav bar -->
  <nav class="vertical">
    <input type="checkbox" id="check">
    <label for="check" class="checkbtn">
      <i class="fa-solid fa-bars"></i>
    </label>
    
    <ul class="nav-links">
        <li id="logo"><a href="index.html"><img src="images/logo.svg" alt="Logo"></a></li>
        <li class="nav-item"><a href="index.html"><img src="images/navitem1.svg" alt="Tasks"></a></li>
        <li class="nav-item"><a href="timetools.html" class="active"><img src="images/navitem2.svg" alt="Time Tools"></a></li>
        <li class="nav-item"><a href="readinglist.html"><img src="images/navitem3.svg" alt="Reading List"></a></li>
        <li class="nav-item"><a href="musicplayer.html"><img src="images/navitem4.svg" alt="Music player"></a></li>
    </ul>
  </nav>

  <!-- page content - stopwath and pomodoro -->
  <div id="timetools" class="page-container">
      <h1>Time Tools</h1>

      <!-- stopwatch -->
      <div class="timetool1">
        <h2>Stopwatch</h2>
        <div class="stopwatchDisplay">
            00 : 00 : 00
        </div>
        
        <div class="buttons">
            <button id="startTimer">Start</button>
            <button id="stopTimer">Stop</button>
            <button id="resetTimer">Reset</button>
        </div>
      </div>  

      <!-- pomodoro -->
      <div class="timetool2">
        <h2>Pomodoro</h2>
        <div id="pomodoro-modes">
          <button data-mode="pomodoro" class="button active mode-button" id="js-pomodoro"> 
            Pomodoro
          </button>
          <button data-mode="shortBreak" class="button mode-button" id="js-short-break">
            Short Break
          </button>
          <button data-mode="longBreak" class="button mode-button" id="js-long-break">
            Long Break
          </button>
        </div>
        
        <div class="clock" id="pomoDisplay">
          <!-- <span id="js-minutes">25</span>
          <span class="separator">:</span>
          <span id="js-seconds">00</span> -->
          25 : 00
        </div>

        <div class="buttons">
          <button id="startTimer">Start</button>
          <button id="stopTimer">Stop</button>
          <button id="resetTimer">Reset</button>
        </div>

      </div>    
      
  </div>


  <script type="module" src="script.js"></script>
</body>

</html>
