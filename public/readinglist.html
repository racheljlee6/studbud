<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StudBud - Reading List</title>
  <link rel="icon" href="images/favicon.svg">
  <link href="scss/main.scss" rel="stylesheet" type="text/css">
  <script src="https://kit.fontawesome.com/9263dbef1b.js" crossorigin="anonymous"></script>
</head>

<body class="app-container">
  <nav class="vertical">
    <input type="checkbox" id="check">
    <label for="check" class="checkbtn">
      <i class="fa-solid fa-bars"></i>
    </label>
    
    <ul class="nav-links">
        <li id="logo"><a href="index.html"><img src="images/logo.svg" alt="Logo"></a></li>
        <li class="nav-item"><a href="index.html"><img src="images/navitem1.svg" alt="Tasks"></a></li>
        <li class="nav-item"><a href="timetools.html"><img src="images/navitem2.svg" alt="Time Tools"></a></li>
        <li class="nav-item"><a href="readinglist.html" class="active"><img src="images/navitem3.svg" alt="Reading List"></a></li>
        <li class="nav-item"><a href="musicplayer.html"><img src="images/navitem4.svg" alt="Music player"></a></li>
    </ul>
  </nav>

  <!-- page content - reading list to save reference links -->
  <div class="page-container">
    <h1>Reading list</h1>
    <div id="reading-list" class="container mt-4">
      <!-- entry form for new references -->
      <form id="entry-form">
        <div class="field">
          <label for="reference">Reference Name</label>
          <input type="text" id="reference">
        </div>
          
        <div class="field">
          <label for="link">Link</label>
          <input type="text" id="link" >
        </div>
        
        <input type="submit" value="New Reference" class="submit-btn">
      </form>
      
      <!-- store references in html table -->
      <table class="reference-table">
        <thead>
          <tr>
            <th>Reference Name</th>
            <th>Link</th>
            <th></th>
          </tr>
        </thead>
        <!-- https://www.w3schools.com/tags/tag_tbody.asp - group content of body in HTML table -->
        <tbody id="reference-list"></tbody>
      </table>
    </div>
    
  </div> 
  <script type="module" src="script.js"></script>
</body>

</html>
