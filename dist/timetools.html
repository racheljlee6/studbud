<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>StudBud - Time Tools</title>
  <link rel="icon" href="/favicon.c5a274bb.svg">
  <link href="/index.c74267d1.css" rel="stylesheet" type="text/css">
  <script src="https://kit.fontawesome.com/9263dbef1b.js" crossorigin="anonymous"></script>
</head>

<body class="app-container">
  <!-- nav bar -->
  <nav class="vertical">
    <input type="checkbox" id="check">
    <label for="check" class="checkbtn">
      <i class="fa-solid fa-bars"></i>
    </label>
    
    <ul class="nav-links">
        <li id="logo"><a href="/index.html"><img src="/logo.01298b6f.svg" alt="Logo"></a></li>
        <li class="nav-item"><a href="/index.html"><img src="/navitem1.f28bcdb5.svg" alt="Tasks"></a></li>
        <li class="nav-item"><a href="/timetools.html" class="active"><img src="/navitem2.0d3bc53b.svg" alt="Time Tools"></a></li>
        <li class="nav-item"><a href="/readinglist.html"><img src="/navitem3.7183616a.svg" alt="Reading List"></a></li>
        <li class="nav-item"><a href="/musicplayer.html"><img src="/navitem4.06d6ebc1.svg" alt="Music player"></a></li>
    </ul>
  </nav>

  <!-- page content - stopwath and pomodoro -->
  <div id="timetools" class="page-container">
      <h1>Time Tools</h1>

      <!-- stopwatch -->
      <div class="timetool1">
        <h2>Stopwatch</h2>
        <div class="stopwatchDisplay">
            00 : 00 : 00
        </div>
        
        <div class="buttons">
            <button id="startTimer">Start</button>
            <button id="stopTimer">Stop</button>
            <button id="resetTimer">Reset</button>
        </div>
      </div>  

    <!-- pomodoro -->
       <div class="timetool2">
        <h2>Pomodoro</h2>

        <!-- pomo modes -->
        <!-- reference data attributes in html https://www.w3schools.com/tags/att_data-.asp -->
        <div id="pomodoro-modes">
          <button data-mode="pomodoro" class="button active mode-button">Pomodoro</button>
          <button data-mode="shortBreak" class="button mode-button">Short Break</button>
          <button data-mode="longBreak" class="button mode-button">Long Break</button>
        </div>

        <!-- pomo timer -->
        <div class="pomo">
          <span id="pomoMins">25</span>
          <span>:</span>
          <span id="pomoSecs">00</span>
        </div>

        <div id="pomo-button">
          <button data-action="start" id="pomoButton">Start</button>
        </div>
      </div>        

  </div> 
  
  <script src="/timetools.3b06b0f7.js" defer=""></script>
</body>
</html>
